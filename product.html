<!-- data ko fetch karna and frondend me display karna -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet"  href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

    <style>

      .container{
        display:flex;
        flex-wrap: wrap;
        gap:20px;
        margin-top: 10px;
        margin-bottom: 10px;
        justify-content: center;
        align-items: center;

      }
    </style>
</head>
<body>


  <div class="container" id="product_container"></div>
<script>


// data k upper loop chalana hai toh try block se data ko bahar nikalnna hai taaki productData par complete data ko bhej saku. 
async function productData()
{
try{

   let response= await fetch("https://dummyjson.com/products");
   let data= await response.json()
  //  console.log(data)
      displayProducts(data.products)   
      //  data as a argument bheja
}
catch(error){
  console.log(error)
}


 function displayProducts(value)
 {

  let html="";
  // console.log(value)
  value.forEach((items)=>{
      //  console.log(items)
    //  `` backticks k throgh hum multiple lines of html code likh sakte hai and jitni baar
    //  object data aayega utni baar html code chalega cards print honge.and jitne objects utne card print honge. or ye kaam loop se hoga.


      html  += `


      <div class="card" style="width: 18rem;">
         <img src=${items.images[0]} class="card-img-top" alt="...">
            <div class="card-body">
            <h5 class="card-title">${items.title}</h5>
           <p class="card-text">${items.category}</p>
             <a href="#" class="btn btn-primary">${items.price}</a>
             </div>
           </div>
      `;
  });

  document.getElementById("product_container").innerHTML=html

  //  real dom

                   
  // hum loop array of object pr chalate hai isliye humne products nikaal liya.


 }

}


productData()
</script>
    
</body>
</html>
